<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelloSky Dashboard</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <span class="settings-icon">⚙️</span>
        <h1>HelloSky</h1>
    </div>

    <div id="login-section">
        <h2>Welcome Back</h2>
        <p class="subtitle">Enter your details to access your dashboard</p>
        <form id="login-form">
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="example@mail.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-main">Login</button>
        </form>
        <p class="switch-text">Don't have an account? <a href="#" id="go-to-register">Sign up</a></p>
    </div>

    <div id="register-section" style="display: none;">
        <h2>Create Account</h2>
        <p class="subtitle">Join HelloSky to track your health and weather</p>
        <form id="register-form">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="example@mail.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Min. 8 characters" required>
            </div>
            <button type="submit" class="btn-main">Create Account</button>
        </form>
        <p class="switch-text">Already have an account? <a href="#" id="go-to-login">Log in</a></p>
    </div>

    <div class="login-footer">
        <a href="index.html">← Back to Dashboard</a>
    </div>
</div>

</body>
</html>
